<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teach with Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/images/landscape.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        form {
            background-color: transparent;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(252, 251, 251, 0.1);
            width: 100%;
            max-width: 500px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: white;
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid white;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: transparent;
            color: white;   
        }
        textarea {
            height: 100px;
            resize: vertical;
            color: transparent;
        }
        fieldset {
            border: 1px solid white;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 15px;
        }
        legend {
            font-weight: bold;
            color: white;
        }
        input[type="radio"] {
            margin-right: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        input[type="file"] {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <form action="">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="course">Teaching Experience:</label>
        <input type="text" id="course" name="course" required>
        
        <label for="qualification">Qualification:</label>
        <input type="text" id="qualification" name="qualification" required>
        
        <label for="Subject-to-teach">Subject you want to teach:</label>
        <textarea id="Subject-to-teach" name="Subject-to-teach" required></textarea>
        <fieldset>
    <legend>Preferred Teaching Mode:</legend>
    <input type="radio" id="online" name="teaching_mode" value="online" required>
    <label for="online">Online</label><br>
    <br><br>
    <input type="radio" id="inperson" name="teaching_mode" value="in-person" required>
    <label for="inperson">In-Person</label>

        </fieldset>

        <label for="intro">Introduction:</label><br>
        <input type="text" id="intro" name="intro" placeholder="Enter your introduction">
        <br><br>
        <label for="description">Brief Description of your yourself:</label><br>
        <textarea id="description" name="description" placeholder="Write a brief description about yourself"></textarea>
        <br><br>
        <label for="file">Upload file</label><br>
        <input type="file" id="file" name="file">
        <br><br>
        
        <button type="submit">Submit</button>
    </form>
</body>
</html>
